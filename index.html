<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FishMate v1</title>
<style>
  body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f8ff; color:#333; }
  header { background:#0077b6; color:white; padding:15px; text-align:center; }
  nav { display:flex; justify-content:space-around; background:#00b4d8; color:white; padding:10px; }
  nav button { background:none; border:none; color:white; font-size:16px; cursor:pointer; }
  section { padding:15px; display:none; }
  section.active { display:block; }
  input, select, textarea { width:100%; padding:5px; margin:5px 0; }
  button.action { background:#0077b6; color:white; padding:10px; border:none; cursor:pointer; width:100%; margin-top:5px; }
  .card { background:white; padding:10px; margin:5px 0; border-radius:5px; box-shadow:0 0 5px #aaa; }
</style>
</head>
<body>

<header>
  <h1>FishMate v1</h1>
</header>

<nav>
  <button onclick="showSection('dashboard')">Dashboard</button>
  <button onclick="showSection('catchlog')">Catch Log</button>
  <button onclick="showSection('luretracker')">Lure Tracker</button>
  <button onclick="showSection('favorites')">Favorites</button>
</nav>

<!-- Dashboard -->
<section id="dashboard" class="active">
  <h2>Today’s Info</h2>
  <label>Weather: <input id="weatherInput" placeholder="Sunny, Cloudy..."></label>
  <label>Water Temp (°F): <input id="waterTemp" type="number" placeholder="65"></label>
  <button class="action" onclick="saveDashboard()">Save Info</button>
  <div id="dashboardInfo"></div>
</section>

<!-- Catch Log -->
<section id="catchlog">
  <h2>Catch Log</h2>
  <label>Fish Type: <input id="fishType"></label>
  <label>Size (inches): <input id="fishSize" type="number"></label>
  <label>Location: <input id="fishLocation"></label>
  <label>Date: <input id="fishDate" type="date"></label>
  <label>Notes: <textarea id="fishNotes"></textarea></label>
  <button class="action" onclick="addCatch()">Add Catch</button>
  <div id="catchList"></div>
</section>

<!-- Lure Tracker -->
<section id="luretracker">
  <h2>Lure Tracker</h2>
  <label>Lure/Bait: <input id="lureName"></label>
  <label>Fish Type: <input id="lureFish"></label>
  <label>Weather: <input id="lureWeather"></label>
  <button class="action" onclick="addLure()">Add Lure</button>
  <div id="lureList"></div>
</section>

<!-- Favorites -->
<section id="favorites">
  <h2>Favorites</h2>
  <label>Favorite Spot: <input id="favSpot"></label>
  <label>Favorite Lure/Combo: <input id="favLure"></label>
  <button class="action" onclick="addFavorite()">Add Favorite</button>
  <div id="favList"></div>
</section>

<script>
  function showSection(id){
    document.querySelectorAll('section').forEach(sec => sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id==='catchlog') renderCatches();
    if(id==='luretracker') renderLures();
    if(id==='favorites') renderFavorites();
    if(id==='dashboard') renderDashboard();
  }

  // --- Dashboard ---
  function saveDashboard(){
    const info = {
      weather: document.getElementById('weatherInput').value,
      waterTemp: document.getElementById('waterTemp').value
    };
    localStorage.setItem('dashboard', JSON.stringify(info));
    renderDashboard();
  }
  function renderDashboard(){
    const info = JSON.parse(localStorage.getItem('dashboard') || '{}');
    document.getElementById('dashboardInfo').innerHTML = 
      info.weather ? `<p>Weather: ${info.weather}</p>` : '';
    document.getElementById('dashboardInfo').innerHTML += 
      info.waterTemp ? `<p>Water Temp: ${info.waterTemp}°F</p>` : '';
  }

  // --- Catch Log ---
  function addCatch(){
    const catchLog = JSON.parse(localStorage.getItem('catchLog') || '[]');
    catchLog.push({
      type: document.getElementById('fishType').value,
      size: document.getElementById('fishSize').value,
      location: document.getElementById('fishLocation').value,
      date: document.getElementById('fishDate').value,
      notes: document.getElementById('fishNotes').value
    });
    localStorage.setItem('catchLog', JSON.stringify(catchLog));
    renderCatches();
  }
  function renderCatches(){
    const catches = JSON.parse(localStorage.getItem('catchLog') || '[]');
    const container = document.getElementById('catchList');
    container.innerHTML = '';
    catches.forEach(c => {
      const card = document.createElement('div');
      card.className='card';
      card.innerHTML = `<strong>${c.type}</strong> - ${c.size}" - ${c.location} (${c.date})<br>${c.notes}`;
      container.appendChild(card);
    });
  }

  // --- Lure Tracker ---
  function addLure(){
    const lures = JSON.parse(localStorage.getItem('lureLog') || '[]');
    lures.push({
      lure: document.getElementById('lureName').value,
      fish: document.getElementById('lureFish').value,
      weather: document.getElementById('lureWeather').value
    });
    localStorage.setItem('lureLog', JSON.stringify(lures));
    renderLures();
  }
  function renderLures(){
    const lures = JSON.parse(localStorage.getItem('lureLog') || '[]');
    const container = document.getElementById('lureList');
    container.innerHTML = '';
    lures.forEach(l => {
      const card = document.createElement('div');
      card.className='card';
      card.innerHTML = `<strong>${l.lure}</strong> - ${l.fish} (${l.weather})`;
      container.appendChild(card);
    });
  }

  // --- Favorites ---
  function addFavorite(){
    const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
    favs.push({
      spot: document.getElementById('favSpot').value,
      lure: document.getElementById('favLure').value
    });
    localStorage.setItem('favorites', JSON.stringify(favs));
    renderFavorites();
  }
  function renderFavorites(){
    const favs = JSON.parse(localStorage.getItem('favorites') || '[]');
    const container = document.getElementById('favList');
    container.innerHTML = '';
    favs.forEach(f => {
      const card = document.createElement('div');
      card.className='card';
      card.innerHTML = `<strong>Spot:</strong> ${f.spot}<br><strong>Lure/Combo:</strong> ${f.lure}`;
      container.appendChild(card);
    });
  }

  // Initial render
  renderDashboard();
</script>

</body>
</html>
