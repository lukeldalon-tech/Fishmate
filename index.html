<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FishMate</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#eef7ff;}
header{text-align:center;background:#0a7cc2;color:white;padding:20px;}
.logo{width:160px;}
nav{display:flex;justify-content:space-around;background:#064e78;padding:10px;}
nav button{background:none;border:none;color:white;font-weight:bold;}
section{display:none;padding:15px;}
.active{display:block;}
.card{background:white;padding:12px;margin:10px 0;border-radius:8px;box-shadow:0 0 6px rgba(0,0,0,.2);}
input,textarea{width:100%;padding:8px;margin:6px 0;border-radius:6px;border:1px solid #ccc;}
button.action{background:#0a7cc2;color:white;border:none;padding:10px;border-radius:6px;width:100%;margin-top:6px;}
#map{height:420px;border-radius:10px;}
img{max-width:140px;border-radius:8px;margin-top:6px;}
</style>
</head>

<body>

<header>
<img src="fishmate-logo.jpg" class="logo">
<h1>FishMate</h1>
<p id="userDisplay"></p>
</header>

<section id="login" class="active">
<div class="card">
<h2>Login</h2>
<input id="email" placeholder="Enter your email">
<button class="action" onclick="login()">Login</button>
</div>
</section>

<div id="app" style="display:none">

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('catch')">Add Catch</button>
<button onclick="show('logs')">Past Logs</button>
<button onclick="show('mapPage')">Map</button>
<button onclick="show('lures')">Lures</button>
</nav>

<section id="home" class="active">
<div class="card">
<h3>Best Lure</h3>
<div id="bestLure"></div>
</div>
</section>

<section id="catch">

<h2>Add Catch</h2>

<input id="fishType" placeholder="Fish species">
<input id="length" placeholder="Length (inches)">
<input id="weight" placeholder="Weight (lbs)">
<input id="lure" placeholder="Lure / bait">
<input type="file" id="photo">
<textarea id="notes" placeholder="Notes"></textarea>

<button class="action" onclick="saveCatch()">Save Catch</button>

</section>

<section id="logs">
<h2>Past Fishing Logs</h2>
<div id="catchList"></div>
</section>

<section id="mapPage">
<h2>Fishing Map</h2>
<div id="map"></div>
</section>

<section id="lures">
<h2>Lure Success Stats</h2>
<div id="lureStats"></div>
</section>

</div>

<script>

function login(){

let email=document.getElementById("email").value

if(!email){
alert("Enter email")
return
}

localStorage.setItem("fishmateUser",email)

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

userDisplay.innerHTML="Logged in as "+email

}

function checkLogin(){

let email=localStorage.getItem("fishmateUser")

if(email){
document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"
userDisplay.innerHTML="Logged in as "+email
}

}

function show(id){

document.querySelectorAll("#app section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

if(id==="logs") renderLogs()

if(id==="mapPage") loadMap()

if(id==="lures") lureStats()

}

function saveCatch(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

function finish(lat,lon){

let data={
fish:fishType.value,
length:length.value,
weight:weight.value,
lure:lure.value,
notes:notes.value,
lat:lat,
lon:lon,
date:new Date().toLocaleDateString()
}

let photo=document.getElementById("photo").files[0]

if(photo){

let reader=new FileReader()

reader.onload=function(){

data.photo=reader.result
catches.push(data)
localStorage.setItem("catches",JSON.stringify(catches))
afterSave()

}

reader.readAsDataURL(photo)

}else{

catches.push(data)
localStorage.setItem("catches",JSON.stringify(catches))
afterSave()

}

}

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(pos){

finish(pos.coords.latitude,pos.coords.longitude)

},function(){

finish(null,null)

})

}else{

finish(null,null)

}

}

function afterSave(){

alert("Catch saved!")

fishType.value=""
length.value=""
weight.value=""
lure.value=""
notes.value=""
photo.value=""

renderLogs()
lureStats()
bestLure()

}

function renderLogs(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

catchList.innerHTML=""

catches.forEach(c=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML="<b>"+c.fish+"</b><br>"+
"Length: "+c.length+" in<br>"+
"Weight: "+c.weight+" lbs<br>"+
"Lure: "+c.lure+"<br>"+c.date

if(c.photo){
let img=document.createElement("img")
img.src=c.photo
div.appendChild(img)
}

catchList.appendChild(div)

})

}

function lureStats(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

let stats={}

catches.forEach(c=>{

if(!stats[c.lure]) stats[c.lure]=0

stats[c.lure]++

})

lureStats.innerHTML=""

for(let lure in stats){

let div=document.createElement("div")

div.className="card"

div.innerHTML=lure+" : "+stats[lure]+" fish"

lureStats.appendChild(div)

}

}

function bestLure(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

if(catches.length===0) return

let stats={}

catches.forEach(c=>{

if(!stats[c.lure]) stats[c.lure]=0

stats[c.lure]++

})

let best=Object.keys(stats).reduce((a,b)=>stats[a]>stats[b]?a:b)

bestLure.innerHTML=best

}

function loadMap(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

let map=L.map("map").setView([37.6,-77.6],10)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let heat=[]

catches.forEach(c=>{

if(c.lat && c.lon){

L.marker([c.lat,c.lon]).addTo(map).bindPopup(c.fish+" - "+c.lure)

heat.push([c.lat,c.lon,0.7])

}

})

if(heat.length>0){
L.heatLayer(heat,{radius:25}).addTo(map)
}

}

checkLogin()
bestLure()

</script>

</body>
</html>
