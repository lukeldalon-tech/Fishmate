<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FishMate</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#eaf6ff;
color:#1b2d3a;
}

header{
background:#0a7cc2;
color:white;
text-align:center;
padding:30px;
}

.logo{
width:220px;
}

nav{
display:flex;
justify-content:space-around;
background:#095d91;
padding:10px;
}

nav button{
background:none;
border:none;
color:white;
font-weight:bold;
font-size:15px;
}

section{
display:none;
padding:15px;
}

.active{
display:block;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:8px;
box-shadow:0 0 6px rgba(0,0,0,.2);
}

input,textarea{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button.action{
background:#0a7cc2;
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
margin-top:5px;
}

#map{
height:400px;
border-radius:10px;
}

img{
max-width:140px;
border-radius:8px;
margin-top:6px;
}

</style>
</head>

<body>

<header>

<img src="fishmate-logo.jpg" class="logo">

<h1>FishMate</h1>

<p>Track catches • Find hot spots • Smarter fishing</p>

</header>

<nav>

<button onclick="show('home')">Home</button>
<button onclick="show('catch')">Add Catch</button>
<button onclick="show('logs')">Logs</button>
<button onclick="show('mapPage')">Map</button>
<button onclick="show('lures')">Lures</button>

</nav>

<section id="home" class="active">

<div class="card">

<h2>Fishing Prediction</h2>

<button class="action" onclick="getWeather()">Get Fishing Forecast</button>

<div id="weather"></div>

<div id="prediction"></div>

</div>

<div class="card">

<h3>Best Lure From Your Data</h3>

<div id="bestLure"></div>

</div>

</section>

<section id="catch">

<h2>Add Catch</h2>

<input id="fishType" placeholder="Fish species">

<input id="length" placeholder="Length (inches)">

<input id="weight" placeholder="Weight (lbs)">

<input id="lure" placeholder="Lure / bait used">

<input type="file" id="photo">

<button class="action" onclick="identifyFish()">AI Identify Fish</button>

<div id="aiResult"></div>

<textarea id="notes" placeholder="Notes"></textarea>

<button class="action" onclick="saveCatch()">Save Catch</button>

</section>

<section id="logs">

<h2>Past Fishing Logs</h2>

<div id="catchList"></div>

</section>

<section id="mapPage">

<h2>Fishing Map + Heatmap</h2>

<div id="map"></div>

</section>

<section id="lures">

<h2>Lure Success Stats</h2>

<div id="lureStats"></div>

</section>

<script>

let model

mobilenet.load().then(m=>{
model=m
})

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

if(id==="logs") renderLogs()

if(id==="mapPage") loadMap()

if(id==="lures") lureStats()

}

async function identifyFish(){

let file=document.getElementById("photo").files[0]

if(!file){
alert("Upload a fish photo")
return
}

let img=document.createElement("img")
img.src=URL.createObjectURL(file)

img.onload=async()=>{

let results=await model.classify(img)

document.getElementById("aiResult").innerHTML="AI guess: "+results[0].className

}

}

function saveCatch(){

navigator.geolocation.getCurrentPosition(pos=>{

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

let reader=new FileReader()

let photoFile=document.getElementById("photo").files[0]

let data={

fish:fishType.value,
length:length.value,
weight:weight.value,
lure:lure.value,
notes:notes.value,
lat:pos.coords.latitude,
lon:pos.coords.longitude,
date:new Date().toLocaleDateString()

}

function finish(){

catches.push(data)

localStorage.setItem("catches",JSON.stringify(catches))

alert("Catch saved!")

bestLure()

}

if(photoFile){

reader.onload=function(){

data.photo=reader.result

finish()

}

reader.readAsDataURL(photoFile)

}else{

finish()

}

})

}

function renderLogs(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

let box=document.getElementById("catchList")

box.innerHTML=""

catches.forEach(c=>{

let div=document.createElement("div")

div.className="card"

div.innerHTML="<b>"+c.fish+"</b><br>"+
"Length: "+c.length+" in<br>"+
"Weight: "+c.weight+" lbs<br>"+
"Lure: "+c.lure+"<br>"+
c.date

if(c.photo){

let img=document.createElement("img")

img.src=c.photo

div.appendChild(img)

}

box.appendChild(div)

})

}

function lureStats(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

let stats={}

catches.forEach(c=>{

if(!stats[c.lure]) stats[c.lure]=0

stats[c.lure]++

})

let box=document.getElementById("lureStats")

box.innerHTML=""

for(let lure in stats){

let div=document.createElement("div")

div.className="card"

div.innerHTML=lure+" : "+stats[lure]+" fish"

box.appendChild(div)

}

}

function bestLure(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

if(catches.length==0) return

let stats={}

catches.forEach(c=>{

if(!stats[c.lure]) stats[c.lure]=0

stats[c.lure]++

})

let best=Object.keys(stats).reduce((a,b)=>stats[a]>stats[b]?a:b)

bestLure.innerHTML=best

}

function loadMap(){

navigator.geolocation.getCurrentPosition(pos=>{

let map=L.map("map").setView([pos.coords.latitude,pos.coords.longitude],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

let heat=[]

catches.forEach(c=>{

if(!c.lat) return

L.marker([c.lat,c.lon]).addTo(map)

heat.push([c.lat,c.lon,0.7])

})

L.heatLayer(heat,{radius:25}).addTo(map)

})

}

function getWeather(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude

let lon=pos.coords.longitude

fetch("https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon+"&current=temperature_2m,pressure_msl")

.then(r=>r.json())

.then(data=>{

let temp=data.current.temperature_2m

let pressure=data.current.pressure_msl

weather.innerHTML="Temp: "+temp+"°<br>Pressure: "+pressure+" hPa"

let prediction=""

if(pressure>1015) prediction="High pressure: slower bite"

else if(pressure<1005) prediction="Low pressure: aggressive bite"

else prediction="Normal fishing conditions"

predictionBox=prediction

document.getElementById("prediction").innerHTML=prediction

})

})

}

bestLure()

</script>

</body>
</html>
