<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FishMate</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#eaf6ff;
color:#1b2d3a;
}

header{
background-image:url("https://images.unsplash.com/photo-1504274066651-8d31a536b11a");
background-size:cover;
background-position:center;
color:white;
text-align:center;
padding:50px;
}

header h1{
font-size:48px;
margin:0;
text-shadow:2px 2px 8px black;
}

nav{
display:flex;
justify-content:space-around;
background:#0a7cc2;
padding:10px;
}

nav button{
background:none;
border:none;
color:white;
font-size:16px;
font-weight:bold;
}

section{
display:none;
padding:15px;
}

.active{
display:block;
}

.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:8px;
box-shadow:0 0 6px rgba(0,0,0,.2);
}

input,textarea{
width:100%;
padding:8px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

button.action{
background:#0a7cc2;
color:white;
border:none;
padding:10px;
border-radius:6px;
width:100%;
margin-top:5px;
}

#mapView{
height:400px;
border-radius:10px;
}

img{
max-width:140px;
border-radius:8px;
margin-top:5px;
}

</style>
</head>

<body>

<header>
<h1>FishMate</h1>
<p>Track catches • Find the best lures • Discover fishing hotspots</p>
</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('catch')">Catch Log</button>
<button onclick="show('map')">Map</button>
<button onclick="show('lures')">Lure Stats</button>
<button onclick="show('favorites')">Favorites</button>
</nav>

<section id="home" class="active">

<div class="card">
<h2>AI Fishing Prediction</h2>
<div id="aiPrediction"></div>
</div>

<div class="card">
<h3>Best Lure</h3>
<div id="suggestion"></div>
</div>

<div class="card">
<h3>Sunrise & Sunset</h3>
<button class="action" onclick="getWeather()">Get Fishing Times</button>
<div id="weather"></div>
</div>

<div class="card">
<h3>Moon Phase</h3>
<div id="moonPhase"></div>
</div>

</section>

<section id="catch">

<h2>Add Catch</h2>

<input list="fishList" id="fishType" placeholder="Fish Type">

<datalist id="fishList">
<option>Largemouth Bass</option>
<option>Smallmouth Bass</option>
<option>Bluegill</option>
<option>Crappie</option>
<option>Catfish</option>
<option>Trout</option>
</datalist>

<input id="fishSize" placeholder="Length (inches)">
<input id="fishWeight" placeholder="Weight (lbs)">
<input id="lureUsed" placeholder="Lure/Bait">

<input type="file" id="fishPhoto" accept="image/*">

<textarea id="notes" placeholder="Notes"></textarea>

<button class="action" onclick="analyzeFish()">Analyze Fish Photo</button>

<div id="fishAI"></div>

<button class="action" onclick="saveCatch()">Save Catch</button>

<h3>Search</h3>

<input id="search" placeholder="Search fish..." oninput="renderCatch()">

<div id="catchList"></div>

</section>

<section id="map">

<h2>Fishing Spot Heatmap</h2>

<div id="mapView"></div>

</section>

<section id="lures">

<h2>Lure Success Stats</h2>

<div id="lureStats"></div>

</section>

<section id="favorites">

<h2>Add Favorite Spot</h2>

<input id="favSpot" placeholder="Spot name">
<textarea id="favNotes" placeholder="Notes"></textarea>

<button class="action" onclick="saveFavorite()">Save Spot</button>

<div id="favList"></div>

</section>

<script>

let map

function show(id){

document.querySelectorAll("section").forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

if(id==="map") loadMap()
if(id==="catch") renderCatch()
if(id==="lures") renderStats()
if(id==="favorites") renderFavorites()

}

function saveCatch(){

navigator.geolocation.getCurrentPosition(pos=>{

let location=pos.coords.latitude+","+pos.coords.longitude

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

let photo=document.getElementById("fishPhoto").files[0]

let catchData={
fish:fishType.value,
size:fishSize.value,
weight:fishWeight.value,
lure:lureUsed.value,
notes:notes.value,
location:location,
date:new Date().toLocaleDateString()
}

function save(){

catches.push(catchData)

localStorage.setItem("catches",JSON.stringify(catches))

renderCatch()
suggestLure()

fishType.value=""
fishSize.value=""
fishWeight.value=""
lureUsed.value=""
notes.value=""

}

if(photo){

let reader=new FileReader()

reader.onload=function(){

catchData.photo=reader.result

save()

}

reader.readAsDataURL(photo)

}else{

save()

}

})

}

function renderCatch(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

let search=document.getElementById("search").value.toLowerCase()

let list=document.getElementById("catchList")

list.innerHTML=""

catches.forEach(c=>{

if(!c.fish.toLowerCase().includes(search)) return

let card=document.createElement("div")

card.className="card"

card.innerHTML="<b>"+c.fish+"</b><br>"+
"Length: "+c.size+" in<br>"+
"Weight: "+c.weight+" lbs<br>"+
"Lure: "+c.lure+"<br>"+
c.date

if(c.photo){

let img=document.createElement("img")
img.src=c.photo
card.appendChild(img)

}

list.appendChild(card)

})

}

function renderStats(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

let stats={}

catches.forEach(c=>{
if(!stats[c.lure]) stats[c.lure]=0
stats[c.lure]++
})

let box=document.getElementById("lureStats")

box.innerHTML=""

for(let lure in stats){

let div=document.createElement("div")
div.className="card"
div.innerHTML="<b>"+lure+"</b>: "+stats[lure]+" fish"
box.appendChild(div)

}

}

function suggestLure(){

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

if(catches.length===0){
document.getElementById("suggestion").innerHTML="Log catches to see best lure"
return
}

let lureCount={}

catches.forEach(c=>{
if(!lureCount[c.lure]) lureCount[c.lure]=0
lureCount[c.lure]++
})

let best=Object.keys(lureCount).reduce((a,b)=>lureCount[a]>lureCount[b]?a:b)

document.getElementById("suggestion").innerHTML="Best lure so far: <b>"+best+"</b>"

}

function loadMap(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

map=L.map('mapView').setView([lat,lon],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let catches=JSON.parse(localStorage.getItem("catches")||"[]")

catches.forEach(c=>{

if(!c.location) return

let parts=c.location.split(",")

L.circle([parts[0],parts[1]],{radius:80,color:'red'}).addTo(map)

})

})

}

function analyzeFish(){

let file=document.getElementById("fishPhoto").files[0]

if(!file){
document.getElementById("fishAI").innerHTML="Upload a photo first"
return
}

let name=file.name.toLowerCase()

let guess="Unknown Fish"

if(name.includes("bass")) guess="Largemouth Bass"
if(name.includes("trout")) guess="Trout"
if(name.includes("cat")) guess="Catfish"

document.getElementById("fishAI").innerHTML="<div class='card'>AI Guess: "+guess+"</div>"

}

function saveFavorite(){

let favs=JSON.parse(localStorage.getItem("favs")||"[]")

favs.push({spot:favSpot.value,notes:favNotes.value})

localStorage.setItem("favs",JSON.stringify(favs))

favSpot.value=""
favNotes.value=""

renderFavorites()

}

function renderFavorites(){

let favs=JSON.parse(localStorage.getItem("favs")||"[]")

let box=document.getElementById("favList")

box.innerHTML=""

favs.forEach(f=>{

let card=document.createElement("div")
card.className="card"
card.innerHTML="<b>"+f.spot+"</b><br>"+f.notes
box.appendChild(card)

})

}

function getWeather(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

fetch(`https://api.sunrise-sunset.org/json?lat=${lat}&lng=${lon}&formatted=0`)
.then(r=>r.json())
.then(data=>{

let sunrise=new Date(data.results.sunrise)
let sunset=new Date(data.results.sunset)

document.getElementById("weather").innerHTML=
"Sunrise: "+sunrise.toLocaleTimeString()+"<br>"+
"Sunset: "+sunset.toLocaleTimeString()

predictFishing(sunrise,sunset)

})

})

}

function predictFishing(sunrise,sunset){

let morning=new Date(sunrise.getTime()+3600000)
let evening=new Date(sunset.getTime()-3600000)

document.getElementById("aiPrediction").innerHTML=
"Best times:<br>"+
morning.toLocaleTimeString()+" morning bite<br>"+
evening.toLocaleTimeString()+" evening bite"

}

function getMoon(){

let today=new Date()

let lp=2551443
let newMoon=new Date(1970,0,7,20,35,0)

let phase=((today.getTime()-newMoon.getTime())/1000)%lp

let index=Math.floor(phase/(lp/8))

let phases=[
"New Moon","Waxing Crescent","First Quarter","Waxing Gibbous",
"Full Moon","Waning Gibbous","Last Quarter","Waning Crescent"
]

document.getElementById("moonPhase").innerHTML=phases[index]

}

getMoon()
suggestLure()
renderCatch()

</script>

</body>
</html>
